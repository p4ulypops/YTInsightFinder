output_dir: /Volumes/PSILVER-2TB/YoutubeInsight

sources:
  - url: "https://www.youtube.com/playlist?list=PLnz01APIg0zVluzyomfB9b1tbzRzGvzJV"
    name: "AI Productivity & 3D Printing"
    type: playlist
    enabled: true

pipeline:
  stages: [transcript, metadata, player_data, download, screenshots, clips, keypoints, tracker, omni, export]
  capture_mode: full
  quality: 720p
  key_moment_mode: smart
  screenshot_offset: 3
  clip_duration: 16
  clip_start_offset: -4
  max_clips: 8
  max_height: 720
  keep_video: false
  segment_download: true
  client_cycle: [android, ios, tv, web_safari, mweb]
  export_formats: [markdown, obsidian, csv, excel, context_card, hermes_skill, llm_skill]

watch:
  poll_interval: 120
  max_workers: 3
  archive_delay: 10
  archive_timeout: 900
  auto_archive: true

categories: [ai-agents, coding, productivity, business, design, 3d-printing, gamification, uncategorized]
